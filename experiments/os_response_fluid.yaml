name: os_response_fluid
output_dir: ../outputs/os_response_fluid

simulation:
  total_cycles: 60000
  max_send_rate: 3.0

  thresholds:
    sender: 96
    noc: 56

  traffic:
    request_bytes: 32
    sender_burst_reqs: 16
    sender_check_interval: 44
    sender_burst_period: 176
    sender_mode: fluid
    noc_queue_capacity_reqs: 128
    sender_noc_inflight_capacity_reqs: 256
    noc_issue_reqs_per_cycle: 1
    noc_queue_delay: 64
    noc_queue_poll_period: 64

  delays:
    forward_sn: 150
    forward_nr: 150
    return_rn: 150
    return_ns: 150
    throttle: 44

  receiver:
    service_profile:
      - start_cycle: 0
        rate: 3.0
      - start_cycle: 3000
        rate: 1.0
      - start_cycle: 9000
        rate: 3.0

controllers:
  - kind: open
    label: 无流控
  - kind: noc
    label: NOC Watermark
  - kind: sender
    label: Sender Outstanding
  - kind: smith_pi
    label: Smith PI
    params:
      signal: sender_or_delayed_noc_error
      threshold: 0
      sender_threshold: 96
      noc_threshold: 56
      kp: 28
      kd: 0
      prediction_delay: 44
      feedback_delay: 44
      measurement_filter_alpha: 0.1
      error_deadband: 2
      max_period_step: 64
      reset_filter_on_nonpositive: true
      min_period: 176
      max_period: 4096

outputs:
  plots: true
  plot_mode: all
